global:
  scrape_interval: 30s
  evaluation_interval: 60s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # SNMP Exporter - scrapes Ruckus R720 APs via SNMP
  - job_name: snmp
    scrape_interval: 30s
    scrape_timeout: 30s
    file_sd_configs:
      - files:
          - /etc/prometheus/targets.yml
    metrics_path: /snmp
    params:
      auth: [ruckus_v2]
      module: [ruckus_r720]
    relabel_configs:
      # Target is the AP address; pass it as __param_target
      - source_labels: [__address__]
        target_label: __param_target
      # Keep the AP address as the "instance" label
      - source_labels: [__address__]
        target_label: instance
      # Route scrape requests to the SNMP exporter
      - target_label: __address__
        replacement: snmp-exporter:9116

  # Unleashed REST API Exporter - per-client metrics
  - job_name: unleashed
    scrape_interval: 30s
    static_configs:
      - targets:
          - unleashed-exporter:9191

  # WAN monitoring - ICMP ping probes
  - job_name: blackbox-icmp
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets:
          - 10.91.1.254    # Gateway
          - 8.8.8.8        # Google DNS
          - 1.1.1.1        # Cloudflare DNS
        labels:
          probe_type: icmp
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__address__]
        target_label: target
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # WAN monitoring - DNS resolution probe
  - job_name: blackbox-dns
    scrape_interval: 30s
    scrape_timeout: 10s
    metrics_path: /probe
    params:
      module: [dns_resolution]
    static_configs:
      - targets:
          - 8.8.8.8        # DNS server to query
        labels:
          probe_type: dns
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__address__]
        target_label: target
      - target_label: __address__
        replacement: blackbox-exporter:9115
